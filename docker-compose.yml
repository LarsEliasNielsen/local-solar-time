# NOTE: the host running this container must have an NTP-synchronized clock.
# Solar time accuracy depends entirely on the accuracy of the server's wall clock.

services:
  solar-time-service:
    build: .
    environment:
      - SOLAR_PORT=${SOLAR_PORT:-8080}
      - SOLAR_CADENCE=${SOLAR_CADENCE:-1s}
    networks:
      - solar-net

  frontend:
    build: ./web
    ports:
      - "80:80"
    environment:
      - SOLAR_PORT=${SOLAR_PORT:-8080}
    networks:
      - solar-net
    depends_on:
      - solar-time-service

networks:
  solar-net:
    name: solar-net
